<html>
<head>
    <meta charset="utf-8">
    <title>Arbol 8 - CECyT 19</title>
    <style>
        body {
            background-color: #f4f4f4; 
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .contenedor {
            background-color: white;
            max-width: 800px;
            margin: 20px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .titulo-arbol {
            color: #6a1b31; 
            font-size: 35px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .info-tecnica {
            text-align: left;
            display: inline-block;
            margin-top: 20px;
            line-height: 1.6;
        }
        .boton-regresar {
            display: inline-block;
            margin-top: 30px;
            background-color: #228B22;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .boton-regresar:hover {
            background-color: #006400;
            transform: scale(1.05);
        }
        img {
            border-radius: 10px;
            margin-top: 20px;
            border: 3px solid #6a1b31;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <div class="titulo-arbol">Árbol 8</div>
     
        <a href="index.html" class="boton-regresar">⬅ Volver al Listado</a>
    </div>

  

</body>
</html>
